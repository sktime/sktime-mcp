site_name: sktime-mcp
site_description: The Semantic Engine for Time-Series Forecasting with LLMs
site_author: sktime-mcp contributors
site_url: https://sktime.github.io/sktime-mcp/ 
repo_name: sktime-mcp
repo_url: https://github.com/sktime/sktime-mcp

theme:
  name: material
  logo: assets/favicon.png
  favicon: assets/favicon.ico
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono

nav:
  - Home: index.md
  - Use Cases: use-cases.md
  - User Guide: user-guide.md
  - Usage Examples: usage-examples.md
  - Data Sources: data-sources.md
  - Background Jobs: background-jobs.md
  - Architecture: architecture.md
  - Implementation: implementation.md
  - Developer Guide: dev-guide.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - tables
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css
